<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Abhilash Sivva ❤️ Darshini Momula</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Playfair Display', serif;
  background: linear-gradient(to bottom, #1a0000, #330000);
  color: #f8f1e7;
  text-align: center;
}

/* ENTRY SCREEN */
.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, #000, #1a0000);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 999;
}

.open-btn {
  padding: 18px 40px;
  font-size: 20px;
  background: linear-gradient(45deg, gold, #d4af37);
  border: none;
  border-radius: 50px;
  cursor: pointer;
  font-weight: bold;
  box-shadow: 0 0 25px rgba(212,175,55,0.7);
  transition: 0.3s;
}

.open-btn:hover {
  transform: scale(1.1);
}

/* CONTENT */
.container {
  opacity: 0;
  transform: scale(0.95);
  transition: 1.5s ease;
  padding: 20px;
}

.container.visible {
  opacity: 1;
  transform: scale(1);
}

h1 {
  font-family: 'Great Vibes', cursive;
  font-size: 64px;
  color: #d4af37;
  margin: 10px 0;
  text-shadow: 0 0 20px rgba(212,175,55,0.4);
}

h2 {
  color: #f1dca7;
  letter-spacing: 2px;
}

/* SECTIONS */
.section {
  margin: 60px 0;
}

.card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(212,175,55,0.3);
  padding: 30px;
  border-radius: 20px;
  margin: 20px;
  backdrop-filter: blur(10px);
}

.highlight {
  font-size: 22px;
  color: #ffd700;
  font-weight: bold;
}

/* BUTTONS */
.btn {
  padding: 12px 28px;
  border-radius: 30px;
  border: none;
  background: linear-gradient(45deg, gold, #d4af37);
  color: black;
  cursor: pointer;
  margin: 10px;
  font-weight: bold;
}

.btn:hover {
  transform: scale(1.1);
}

/* COUNTDOWN */
#countdown {
  margin-top: 10px;
  font-size: 20px;
  color: #fff;
}

/* PETALS */
.petal {
  position: fixed;
  top: -10px;
  width: 10px;
  height: 10px;
  background: #d4af37;
  border-radius: 50%;
  opacity: 0.6;
  animation: fall linear infinite;
}

@keyframes fall {
  to { transform: translateY(110vh); }
}

</style>
</head>

<body>

<div class="overlay" id="overlay">
  <button class="open-btn" onclick="openInvite()">Open Invitation</button>
</div>

<audio id="music" loop>
  <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3">
</audio>

<div class="container" id="content">

<div class="section">
  <h2>Together with their families</h2>
  <h1>Abhilash Sivva</h1>
  <h2>&</h2>
  <h1>Darshini Momula</h1>
</div>

<div class="section card">
  <h2>Wedding Ceremony</h2>
  <p class="highlight">June 25, 2026</p>
  <p class="highlight">11:30 AM</p>
  <div id="countdown"></div>
</div>

<div class="section card">
  <h2>Venue</h2>
  <p class="highlight">Vara Convention, Hyderabad</p>
  <button class="btn" onclick="openMap()">View Map</button>
</div>

<div class="section">
  <button class="btn" onclick="addToCalendar()">Save the Date</button>
</div>

<div class="section">
  <p>With love, we invite you to bless us ❤️</p>
</div>

</div>

<script>
function openInvite() {
  document.getElementById("overlay").style.display = "none";
  document.getElementById("content").classList.add("visible");
  document.getElementById("music").play();

  createPetals();
  startCountdown();
}

function createPetals() {
  for (let i = 0; i < 20; i++) {
    let p = document.createElement("div");
    p.className = "petal";
    p.style.left = Math.random()*100+"vw";
    p.style.animationDuration = (5+Math.random()*5)+"s";
    document.body.appendChild(p);
  }
}

function startCountdown() {
  const weddingDate = new Date(2026, 5, 25, 11, 30, 0).getTime();

  setInterval(() => {
    const now = new Date().getTime();
    const diff = weddingDate - now;

    if (diff <= 0) {
      document.getElementById("countdown").innerHTML = "🎉 It's Wedding Time!";
      return;
    }

    const d = Math.floor(diff/(1000*60*60*24));
    const h = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
    const m = Math.floor((diff%(1000*60*60))/(1000*60));

    document.getElementById("countdown").innerHTML =
      d+" days "+h+" hrs "+m+" mins";
  },1000);
}

function openMap() {
  window.open("https://www.google.com/maps/search/Vara+Convention+Hyderabad");
}

function addToCalendar() {
  window.open("https://www.google.com/calendar/render?action=TEMPLATE&text=Wedding&dates=20260625T060000Z/20260625T090000Z");
}
</script>

</body>
</html>
