<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Abhilash ❤️ Darshini</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(to bottom, #fff0f3, #ffe5ec);
  text-align: center;
  overflow-x: hidden;
}

/* ENTRY */
.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, #1a0000, #000);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 999;
  flex-direction: column;
  color: white;
}

.open-btn {
  padding: 18px 36px;
  font-size: 22px;
  background: gold;
  border: none;
  border-radius: 50px;
  cursor: pointer;
  box-shadow: 0 0 25px gold;
  animation: pulse 1.5s infinite;
}

@keyframes pulse {
  0% { transform: scale(1);}
  50% { transform: scale(1.1);}
  100% { transform: scale(1);}
}

/* CONTENT */
.container {
  opacity: 0;
  transform: scale(0.95);
  transition: 1.5s ease;
}

.container.visible {
  opacity: 1;
  transform: scale(1);
}

h1 {
  font-family: 'Great Vibes', cursive;
  font-size: 60px;
  color: #c9184a;
}

.section {
  margin: 50px 20px;
}

.card {
  background: white;
  padding: 25px;
  border-radius: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  margin: 20px;
}

.highlight {
  font-weight: bold;
  font-size: 22px;
  color: #a4133c;
}

/* BUTTONS */
.btn {
  padding: 12px 24px;
  border-radius: 30px;
  border: none;
  background: #ff4d6d;
  color: white;
  cursor: pointer;
  margin: 10px;
  font-size: 16px;
}

.btn:hover {
  transform: scale(1.1);
}

/* PETALS */
.petal {
  position: fixed;
  width: 10px;
  height: 10px;
  background: pink;
  border-radius: 50%;
  top: -10px;
  animation: fall linear infinite;
}

@keyframes fall {
  to { transform: translateY(110vh); }
}

/* GALLERY */
.gallery img {
  width: 90%;
  max-width: 300px;
  border-radius: 20px;
  margin: 10px;
}

/* RSVP */
input, textarea {
  width: 80%;
  padding: 10px;
  margin: 10px;
  border-radius: 10px;
  border: 1px solid #ccc;
}

/* RINGS */
.rings {
  font-size: 50px;
  animation: spin 2s ease;
}

@keyframes spin {
  from { transform: scale(0) rotate(0deg);}
  to { transform: scale(1) rotate(360deg);}
}
</style>
</head>

<body>

<div class="overlay" id="overlay">
  <h2>You're Invited 💖</h2>
  <button class="open-btn" onclick="openInvite()">Open Invitation</button>
</div>

<audio id="music" loop>
  <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3">
</audio>

<div class="container" id="content">

<div class="section">
  <div class="rings">💍💍</div>
  <h1>Abhilash</h1>
  <h2>&</h2>
  <h1>Darshini</h1>
</div>

<div class="section card">
  <h2>Wedding Ceremony</h2>
  <p class="highlight">June 25, 2026</p>
  <p class="highlight">11:30 AM</p>
  <div id="countdown"></div>
</div>

<div class="section card">
  <h2>Venue</h2>
  <p class="highlight">Vara Convention, Hyderabad</p>
  <button class="btn" onclick="openMap()">View Map</button>
</div>

<div class="section">
  <button class="btn" onclick="addToCalendar()">📅 Save the Date</button>
</div>

<div class="section gallery">
  <h2>Our Moments 💕</h2>
  <img src="https://via.placeholder.com/300">
  <img src="https://via.placeholder.com/300">
</div>

<div class="section card">
  <h2>RSVP 💌</h2>
  <input type="text" placeholder="Your Name">
  <textarea placeholder="Message"></textarea>
  <button class="btn">Send</button>
</div>

</div>

<script>
function openInvite() {
  document.getElementById("overlay").style.display = "none";
  document.getElementById("content").classList.add("visible");
  document.getElementById("music").play();

  createPetals();
  startCountdown();
}

function createPetals() {
  for (let i = 0; i < 25; i++) {
    let p = document.createElement("div");
    p.className = "petal";
    p.style.left = Math.random()*100+"vw";
    p.style.animationDuration = (4+Math.random()*5)+"s";
    document.body.appendChild(p);
  }
}

function startCountdown() {
  const weddingDate = new Date(2026, 5, 25, 11, 30, 0).getTime();

  setInterval(() => {
    const now = new Date().getTime();
    const diff = weddingDate - now;

    if (diff <= 0) {
      document.getElementById("countdown").innerHTML = "🎉 It's Wedding Time!";
      fireworks();
      return;
    }

    const d = Math.floor(diff/(1000*60*60*24));
    const h = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
    const m = Math.floor((diff%(1000*60*60))/(1000*60));

    document.getElementById("countdown").innerHTML =
      d+" days "+h+" hrs "+m+" mins";
  },1000);
}

function openMap() {
  window.open("https://www.google.com/maps/search/Vara+Convention+Hyderabad");
}

function addToCalendar() {
  window.open("https://www.google.com/calendar/render?action=TEMPLATE&text=Abhilash+Wedding&dates=20260625T060000Z/20260625T090000Z");
}

function fireworks() {
  alert("🎆 Wedding Time 🎆");
}
</script>

</body>
</html>
